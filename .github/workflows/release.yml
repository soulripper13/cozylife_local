name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-asset:
    name: Build HACS ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build HACS release ZIP
        run: |
          zip -r cozylife_new.zip custom_components/cozylife_local \
            -x "*/__pycache__/*" \
            -x "*.pyc" \
            -x "*/.DS_Store"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cozylife_new.zip
